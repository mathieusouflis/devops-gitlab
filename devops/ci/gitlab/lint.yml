.feature-branch-rules:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH =~ /^feature\/.*/

.node-job:
  image: node:alpine
  before_script:
    - npm ci

lint:compose:
  stage: lint
  extends: .feature-branch-rules
  allow_failure: false
  script:
    - docker-compose -f docker-compose.yml config -q

lint:hadolint:
  stage: lint
  extends: .feature-branch-rules
  allow_failure: false
  script:
    - hadolint Dockerfile.backend
    - hadolint Dockerfile.frontend

lint:yaml:
  stage: lint
  extends: .feature-branch-rules
  allow_failure: false
  script:
    - yamllint -c .yamllint.yml .

lint:backend:
  stage: lint
  extends: .feature-branch-rules
  allow_failure: false
  script:
    - docker compose run --rm backend pnpm run lint
    - docker compose run --rm backend pnpm run lint:eslint

lint:eslint:
  stage: lint
  extends: 
    - .feature-branch-rules
    - .node-job
  allow_failure: false
  script:
    - pnpm run lint:eslint