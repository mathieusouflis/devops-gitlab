.build-image:
  services:
    - docker:27.0.3-dind

  interruptible: false
  allow_failure: false
  timeout: 20 minutes

  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_BUILDKIT: "1"

  needs:
    - build

  before_script:
    - apk add --no-cache curl
    - |
      case "$(uname -m)" in
        aarch64) PLATFORM="linux-arm64" ;;
        x86_64)  PLATFORM="linux-amd64" ;;
        *) echo "Unsupported architecture: $(uname -m)" && exit 1 ;;
      esac
      curl -fsSL "https://amazon-ecr-credential-helper-releases.s3.us-east-2.amazonaws.com/0.12.0/${PLATFORM}/docker-credential-ecr-login" \
        -o /usr/local/bin/docker-credential-ecr-login
      chmod +x /usr/local/bin/docker-credential-ecr-login
    - mkdir -p /root/.docker
    - printf '{"credHelpers":{"%s":"ecr-login"}}' "$AWS_ECR_REGISTRY" > /root/.docker/config.json
    - test -n "$AWS_ECR_REGION"
    - test -n "$AWS_ECR_REGISTRY"
    - test -n "$AWS_ECR_REPOSITORY_URI"
    - test -n "$BACKEND_PORT"
    - test -n "$VITE_FRONTEND_PORT"
    - test -n "$VITE_FRONTEND_API_URL"

  script:
    - export BACKEND_IMAGE_SHA_TAG="${AWS_ECR_REPOSITORY_URI}:backend-${CI_COMMIT_SHA}"
    - export BACKEND_IMAGE_SHORT_TAG="${AWS_ECR_REPOSITORY_URI}:backend-${CI_COMMIT_SHORT_SHA}"
    - export FRONTEND_IMAGE_SHA_TAG="${AWS_ECR_REPOSITORY_URI}:frontend-${CI_COMMIT_SHA}"
    - export FRONTEND_IMAGE_SHORT_TAG="${AWS_ECR_REPOSITORY_URI}:frontend-${CI_COMMIT_SHORT_SHA}"
    - echo "Building prod images for ${CI_COMMIT_SHA} into ${AWS_ECR_REPOSITORY_URI}"
    - |
      docker build \
        --file devops/docker/backend/Dockerfile.backend.prod \
        --build-arg BACKEND_PORT="$BACKEND_PORT" \
        --tag "$BACKEND_IMAGE_SHA_TAG" \
        --tag "$BACKEND_IMAGE_SHORT_TAG" \
        --label "org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
        --label "org.opencontainers.image.revision=${CI_COMMIT_SHA}" \
        --label "org.opencontainers.image.source=${CI_PROJECT_URL}" \
        .
    - |
      docker build \
        --file devops/docker/frontend/Dockerfile.frontend.prod \
        --build-arg FRONTEND_PORT="$VITE_FRONTEND_PORT" \
        --build-arg VITE_FRONTEND_API_URL="$VITE_FRONTEND_API_URL" \
        --tag "$FRONTEND_IMAGE_SHA_TAG" \
        --tag "$FRONTEND_IMAGE_SHORT_TAG" \
        --label "org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
        --label "org.opencontainers.image.revision=${CI_COMMIT_SHA}" \
        --label "org.opencontainers.image.source=${CI_PROJECT_URL}" \
        .
    - docker push "$BACKEND_IMAGE_SHA_TAG"
    - docker push "$BACKEND_IMAGE_SHORT_TAG"
    - docker push "$FRONTEND_IMAGE_SHA_TAG"
    - docker push "$FRONTEND_IMAGE_SHORT_TAG"
    - docker tag "$BACKEND_IMAGE_SHA_TAG" "${AWS_ECR_REPOSITORY_URI}:backend"
    - docker tag "$FRONTEND_IMAGE_SHA_TAG" "${AWS_ECR_REPOSITORY_URI}:frontend"
    - docker push "${AWS_ECR_REPOSITORY_URI}:backend"
    - docker push "${AWS_ECR_REPOSITORY_URI}:frontend"

publish-prod:
  stage: publish
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  environment: production
  extends: .build-image

publish-staging:
  stage: publish

  rules:
    - if: $CI_COMMIT_BRANCH != "main"
    - when: never
  environment: staging
  extends: .build-image

  image: docker:27.0.3
