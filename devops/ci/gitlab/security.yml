dependency-scan:
  stage: test
  image: node:22-alpine
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - package.json
        - package-lock.json
        - yarn.lock
        - pnpm-lock.yaml
  before_script:
    - npm install -g pnpm
    - pnpm install
  script:
    - pnpm audit --audit-level=high
  allow_failure: false
