# Rate limiting — applied to API only
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# Connection limiting — guards against connection floods
limit_conn_zone $binary_remote_addr zone=addr:10m;

# Upstream definitions with keepalive connection pools
upstream backend  { server backend:${BACKEND_PORT};  keepalive 32; }
upstream frontend { server frontend:${VITE_FRONTEND_PORT}; keepalive 16; }

server {
    listen 80;
    server_name _;

    # Hide nginx version
    server_tokens off;

    # Gzip compression
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        application/rss+xml application/atom+xml
        image/svg+xml font/woff2;

    # ALB health check — handled directly by nginx, no app container involved
    location = /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # API — rate-limited, stripped /api prefix
    location /api/ {
        limit_req  zone=api burst=40 nodelay;
        limit_conn addr 20;

        proxy_pass         http://backend/;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
        proxy_buffering       on;
        proxy_buffer_size     4k;
        proxy_buffers         8 4k;

        add_header X-Frame-Options        "SAMEORIGIN"                      always;
        add_header X-Content-Type-Options "nosniff"                         always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    }

    # Static assets — content-hashed filenames, aggressive caching
    location /assets/ {
        proxy_pass         http://frontend/assets/;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";

        expires             1y;
        add_header          Cache-Control    "public, immutable";
        add_header          X-Content-Type-Options "nosniff" always;
        access_log          off;
    }

    # SPA — all other routes served by the frontend container
    location / {
        proxy_pass         http://frontend/;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        proxy_connect_timeout 5s;
        proxy_send_timeout    15s;
        proxy_read_timeout    15s;

        add_header X-Frame-Options        "SAMEORIGIN"                      always;
        add_header X-Content-Type-Options "nosniff"                         always;
        add_header X-XSS-Protection       "1; mode=block"                   always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;
    }
}
