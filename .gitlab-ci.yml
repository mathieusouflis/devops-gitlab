workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH =~ /^feature\/.*/
    - when: never

stages:
  # - lint
  - test
  # - build
  # - publish
  # - deploy

variables:
  VITE_FRONTEND_PORT: $CI_VITE_FRONTEND_PORT
  VITE_FRONTEND_API_URL: $CI_VITE_FRONTEND_API_URL
  BACKEND_PORT: $CI_BACKEND_PORT
  POSTGRES_USER: $CI_POSTGRES_USER
  POSTGRES_PASSWORD: $CI_POSTGRES_PASSWORD
  POSTGRES_DB: $CI_POSTGRES_DB
  HTTP_PORT: $CI_HTTP_PORT

include:
  # - local: "devops/ci/gitlab/lint.yml"
  - local: "devops/ci/gitlab/test.yml"
  # - local: "devops/ci/gitlab/build.yml"
  # - local: "devops/ci/gitlab/security.yml"
  # - local: "devops/ci/gitlab/publish-image.yml"
  # - local: "devops/ci/gitlab/deploy.yml"
