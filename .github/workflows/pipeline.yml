name: Pipeline

on:
  push:
    branches:
      - main
      - develop
      - staging
      - "feature/**"
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  test:
    needs: lint
    uses: ./.github/workflows/test.yml
    secrets: inherit

  build:
    needs: lint
    uses: ./.github/workflows/build.yml

  publish:
    needs: [build, test]
    if: github.ref_name == 'staging'
    permissions:
      contents: write
    uses: ./.github/workflows/publish.yml
    secrets: inherit
    with:
      environment: staging

  deploy:
    needs: publish
    if: github.ref_name == 'staging'
    permissions:
      contents: write
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    with:
      environment: staging

  promote:
    needs: [build, test]
    if: github.ref_name == 'main'
    permissions:
      contents: read
    uses: ./.github/workflows/promote.yml
    secrets: inherit
