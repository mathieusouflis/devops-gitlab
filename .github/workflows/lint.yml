name: Lint

on:
  workflow_call:

jobs:
  compose:
    name: lint:compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose files
        run: |
          find . \( -name 'docker-compose*.yml' -o -name 'docker-compose*.yaml' \) | grep -v '\.ci\.' | xargs -I {} sh -c 'docker compose -f {} config -q || (echo "Error: Failed to validate {}" && exit 1)'
          docker compose -f docker-compose.prod.yaml -f docker-compose.ci.yaml config -q || (echo "Error: Failed to validate CI overlay" && exit 1)

  hadolint:
    name: lint:hadolint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true

  yaml:
    name: lint:yaml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint.yml

  eslint:
    name: lint:eslint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
