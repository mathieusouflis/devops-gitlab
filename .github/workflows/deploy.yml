name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true

jobs:
  deploy:
    name: deploy (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 20
    permissions:
      contents: write
    env:
      TG_DIR: ${{ inputs.environment == 'production' && 'devops/live/prod' || 'devops/live/staging' }}
      TF_VAR_ecr_repository_arn: ${{ vars.AWS_ECR_REPOSITORY_ARN }}
      TF_VAR_app_postgres_user: ${{ vars.POSTGRES_USER }}
      TF_VAR_app_postgres_password: ${{ vars.POSTGRES_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_ECR_REGION }}
      - uses: hashicorp/setup-terraform@v3
      - name: Install Terragrunt
        run: |
          LATEST=$(curl -s https://api.github.com/repos/gruntwork-io/terragrunt/releases/latest | jq -r '.tag_name')
          curl -Lo /usr/local/bin/terragrunt "https://github.com/gruntwork-io/terragrunt/releases/download/${LATEST}/terragrunt_linux_amd64"
          chmod +x /usr/local/bin/terragrunt
      - name: Terragrunt apply
        run: terragrunt apply --auto-approve
        working-directory: ${{ env.TG_DIR }}
      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$TG_DIR/terraform.tfstate"
          git diff --cached --quiet || git commit -m "chore(terraform): update state for ${{ inputs.environment }} [skip ci]"
          git push
      - name: Trigger ASG instance refresh
        run: |
          REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "${{ vars.AWS_ASG_NAME }}" \
            --preferences '{"MinHealthyPercentage": 50}' \
            --region "${{ vars.AWS_ECR_REGION }}" \
            --query 'InstanceRefreshId' \
            --output text)
          echo "Instance refresh started: $REFRESH_ID"
          while true; do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "${{ vars.AWS_ASG_NAME }}" \
              --instance-refresh-ids "$REFRESH_ID" \
              --region "${{ vars.AWS_ECR_REGION }}" \
              --query 'InstanceRefreshes[0].Status' \
              --output text)
            echo "Refresh status: $STATUS"
            case "$STATUS" in
              Successful) echo "Deploy complete."; exit 0 ;;
              Failed|Cancelled) echo "Deploy failed with status: $STATUS"; exit 1 ;;
              *) sleep 30 ;;
            esac
          done
